version: 2

models:
  - name: stg_telegram_messages
    description: Cleaned Telegram messages
    columns:
      - name: message_id
        tests:
          - not_null
      - name: channel_name
        tests:
          - not_null
      - name: views
        tests:
          - not_null

  - name: fct_messages
    description: Fact table with all messages
    columns:
      - name: message_id
        tests:
          - not_null
      - name: channel_name
        tests:
          - not_null

  - name: dim_channels
    description: Channel dimension table
    columns:
      - name: channel_name
        tests:
          - not_null
          - unique

  - name: fct_image_detections
    description: Image detections joined to messages with business image categorization
    columns:
      - name: detection_id
        tests:
          - not_null
          - unique
      - name: message_id
        tests:
          - not_null
      - name: image_category
        tests:
          - accepted_values:
              values: ['product_display', 'lifestyle', 'promotional', 'other']
