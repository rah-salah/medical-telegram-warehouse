version: 2

models:
  - name: stg_telegram_messages
    description: Cleaned Telegram messages
    columns:
      - name: message_id
        tests:
          - not_null
      - name: channel_name
        tests:
          - not_null
      - name: views
        tests:
          - not_null

  - name: fct_messages
    description: Fact table with all messages
    columns:
      - name: message_id
        tests:
          - not_null
      - name: channel_name
        tests:
          - not_null

  - name: dim_channels
    description: Channel dimension table
    columns:
      - name: channel_name
        tests:
          - not_null
          - unique
